<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Calculateur d'équation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1f2937;
        }

        p {
            text-align: center;
            color: #4b5563;
        }

        .formule {
            font-size: 22px;
            font-weight: bold;
            color: #2563eb;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .resultat {
            margin-top: 25px;
            padding: 18px;
            background: #eff6ff;
            border-left: 5px solid #2563eb;
            border-radius: 8px;
            font-size: 17px;
            color: #1e3a8a;
            min-height: 40px;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: #6b7280;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Équation du second degré</h1>

        <p>Résoudre une équation sous la forme :</p>
        <p class="formule">ax² + bx + c = 0</p>

        <label for="a">Valeur de a</label>
        <input type="number" id="a" placeholder="Exemple : 1">

        <label for="b">Valeur de b</label>
        <input type="number" id="b" placeholder="Exemple : -3">

        <label for="c">Valeur de c</label>
        <input type="number" id="c" placeholder="Exemple : 2">

        <button onclick="resoudreEquation()">Résoudre l'équation</button>

        <div class="resultat" id="resultat">
            Le résultat s'affichera ici.
        </div>

        <div class="footer">
            Mini-projet web HTML, CSS et JavaScript
        </div>

    </div>

    <script>
        function resoudreEquation() {
            let a = Number(document.getElementById("a").value);
            let b = Number(document.getElementById("b").value);
            let c = Number(document.getElementById("c").value);

            if (a === 0) {
                document.getElementById("resultat").innerHTML =
                    "Erreur : a ne peut pas être égal à 0 pour une équation du second degré.";
                return;
            }

            let delta = b * b - 4 * a * c;

            let resultat = "<strong>Delta = </strong>" + delta + "<br><br>";

            if (delta > 0) {
                let x1 = (-b - Math.sqrt(delta)) / (2 * a);
                let x2 = (-b + Math.sqrt(delta)) / (2 * a);

                resultat += "Il y a <strong>deux solutions réelles</strong> :<br>";
                resultat += "x1 = " + x1 + "<br>";
                resultat += "x2 = " + x2;
            } 
            else if (delta === 0) {
                let x = -b / (2 * a);

                resultat += "Il y a <strong>une solution réelle double</strong> :<br>";
                resultat += "x = " + x;
            } 
            else {
                resultat += "Il n'y a <strong>aucune solution réelle</strong>.";
            }

            document.getElementById("resultat").innerHTML = resultat;
        }
    </script>

</body>
</html>
